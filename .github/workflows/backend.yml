name: Build and Push Backend Image

on:
    push:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login in to GitHub Container Registry
              run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build image
              run: docker build -t ghcr.io/${{ github.repository_owner }}/prod-lab-backend:${{ github.sha }} .

            - name: Push image
              run: docker push ghcr.io/${{ github.repository_owner }}/prod-lab-backend:${{ github.sha }}
